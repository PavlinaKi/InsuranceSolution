services:
  # insurancesolution.api:
  #   image: ${DOCKER_REGISTRY-}insurancesolutionapi
  #   build:
  #     context: .
  #     dockerfile: InsuranceSolution.API/Dockerfile
  postgres-db:
    image: postgres
    container_name: insurance-postgres
    restart: always
    environment:
      POSTGRES_USER: insurance_user
      POSTGRES_PASSWORD: insurance_pass
      POSTGRES_DB: insurance_db
    ports:
      - "5432:5432" # You can remove this if you don't want it accessible from the host
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - insurance-network

volumes:
  postgres-data:

networks:
  insurance-network:
    driver: bridge